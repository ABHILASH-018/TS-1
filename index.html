<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Positioning Assignment</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Sticky Navbar -->
    <nav class="sticky top-0 bg-white border-b p-4 flex justify-between items-center">
        <h1 class="font-bold text-xl">Project</h1>

        <ul class="flex gap-6">
            <li><a href="#">Home</a></li>
            <li><a href="#">Features</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="text-center py-16">

        <h2 class="text-4xl font-bold mb-4">
            Welcome to Our Workspace
        </h2>

        <p class="mb-12">
            Manage your projects easily using one simple workspace.
        </p>

        <!-- Relative + Absolute CTA Buttons -->
        <div class="relative w-96 h-24 mx-auto mb-16 border">

            <button
                class="absolute left-4 top-4 bg-black text-white px-5 py-2 rounded">
                Get Started
            </button>

            <button
                class="absolute right-4 bottom-4 border border-black px-5 py-2 rounded">
                Learn More
            </button>

        </div>

        <!-- Dashboard Section -->
        <div class="relative w-3/4 h-96 mx-auto border bg-white">

            <img
                src="https://placehold.co/800x400"
                alt="Dashboard"
                class="w-full h-full object-cover">

            <!-- Floating Card -->
            <div class="absolute top-5 left-5 bg-white border p-3">
                Tasks Completed
            </div>

            <!-- Floating Card -->
            <div class="absolute top-20 right-5 bg-white border p-3">
                Team Online
            </div>

            <!-- Floating Card -->
            <div class="absolute bottom-5 left-1/2 -translate-x-1/2 bg-white border p-3">
                Progress: 80%
            </div>

        </div>

    </section>

    <!-- Fixed Chat Button -->
    <button
        class="fixed bottom-5 right-5 bg-blue-600 text-white px-4 py-3 rounded-full">
        Chat
    </button>

</body>
</html>
