<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind Positioning Assignment</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <!-- Sticky Navbar -->
    <nav class="sticky top-0 z-50 bg-white border-b p-4 flex justify-between items-center">
        <h1 class="font-bold text-xl">+ Project</h1>

        <ul class="flex gap-6 items-center">
            <li><a href="#" class="hover:text-orange-500 transition-colors">Product</a></li>
            <li><a href="#" class="hover:text-orange-500 transition-colors">Solutions</a></li>
            <li><a href="#" class="hover:text-orange-500 transition-colors">Resources</a></li>
            <li><a href="#" class="hover:text-orange-500 transition-colors">Pricing</a></li>
            <li><a href="#" class="hover:text-orange-500 transition-colors">Log in</a></li>
            <li>
                <button class="bg-black text-white px-4 py-2 rounded hover:bg-gray-800 transition-colors">
                    Get AI free
                </button>
            </li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="text-center py-16 bg-gradient-to-b from-orange-100 to-white">

        <h2 class="text-4xl font-bold mb-4">
            Write, plan, share. With AI at your side.
        </h2>

        <p class="mb-12">
            Manage your projects easily using one simple workspace.
        </p>

        <!-- Relative + Absolute CTA Buttons -->
        <div class="relative w-96 h-24 mx-auto mb-16 border">

            <button
                class="absolute left-4 top-4 bg-black text-white px-5 py-2 rounded hover:bg-gray-800 hover:scale-105 transition-all">
                Get AI free
            </button>

            <button
                class="absolute right-4 bottom-4 border border-black px-5 py-2 rounded hover:bg-black hover:text-white transition-colors">
                Request a demo
            </button>

        </div>

        <!-- Dashboard Section -->
        <div class="relative w-3/4 h-96 mx-auto border bg-white">

            <img
                src="./OIP.png"
                alt="Dashboard"
                class="w-full h-full object-cover">

            <!-- Floating Card: Tasks -->
            <div class="absolute top-5 left-5 bg-white border rounded-lg shadow-md p-3 flex items-center gap-2 hover:shadow-lg transition-shadow">
                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-green-100 text-green-600">
                    <!-- check-circle icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </span>
                <div class="text-left">
                    <p class="text-xs text-gray-500">Tasks</p>
                    <p class="text-sm font-medium">12 tasks completed today</p>
                </div>
            </div>

            <!-- Floating Card: Project Status -->
            <div class="absolute top-20 right-5 bg-white border rounded-lg shadow-md p-3 flex items-center gap-2 hover:shadow-lg transition-shadow">
                <span class="flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 text-blue-600">
                    <!-- trending-up icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                </span>
                <div class="text-left">
                    <p class="text-xs text-gray-500">Project Status</p>
                    <p class="text-sm font-medium">On Track</p>
                </div>
            </div>

            <!-- Floating Card: Team Activity -->
            <div class="absolute bottom-5 left-1/2 -translate-x-1/2 bg-white border rounded-lg shadow-md p-3 flex items-center gap-2 hover:shadow-lg transition-shadow">
                <div class="flex -space-x-2">
                    <img src="./OIP1.png" alt="user" class="w-6 h-6 rounded-full border-2 border-white">
                    <img src="./OIP1.png" alt="user" class="w-6 h-6 rounded-full border-2 border-white">
                    <img src="./OIP1.png" alt="user" class="w-6 h-6 rounded-full border-2 border-white">
                </div>
                <div class="text-left">
                    <p class="text-xs text-gray-500">Team Activity</p>
                    <p class="text-sm font-medium">+5 online</p>
                </div>
            </div>

        </div>

    </section>

    <!-- Fixed Chat Button -->
    <button
        class="fixed bottom-5 right-5 z-50 bg-blue-600 text-white px-4 py-3 rounded-full hover:bg-blue-700 hover:scale-105 transition-all">
        Chat
    </button>

</body>
</html>
